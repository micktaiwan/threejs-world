<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monde 3D</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; }
        canvas { display: block; }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: sans-serif;
            cursor: pointer;
            z-index: 10;
        }
        #overlay h1 { font-size: 2em; margin-bottom: 20px; }
        #overlay p { font-size: 1.2em; opacity: 0.8; }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            border: 1px solid black;
        }
        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        #crosshair::after {
            width: 20px;
            height: 2px;
            top: 9px;
            left: 0;
        }
        .hidden { display: none !important; }
        #stats {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 12px;
            border-radius: 4px;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Cliquez pour jouer</h1>
        <p>ZQSD : se déplacer | E/A : monter/descendre | Clic : missile | R : reset</p>
    </div>
    <div id="crosshair" class="hidden"></div>
    <div id="stats" class="hidden">Objets: 0 | Missiles: 0</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
    }
    </script>
    <script type="module" src="./js/main.js?v1"></script>
</body>
</html>
